name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Rust kur
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust önbelleği
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: npm bağımlılıkları yükle
        run: npm install

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Arduino Typing Tutor ${{ github.ref_name }}'
          releaseBody: |
            ## Kurulum

            **macOS:** `.dmg` dosyasını indirin, uygulamayı Applications klasörüne sürükleyin.
            İlk açılışta: Sağ tık → Aç (imzasız uygulama uyarısını geçmek için)

            **Windows:** `.msi` dosyasını indirip çalıştırın.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # ── macOS güncelleme manifesti ──────────────────────────────────────────
      - name: macOS güncelleme manifesti oluştur
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          SIG_FILE="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Arduino Typing Tutor.app.tar.gz.sig"
          SIG=$(cat "$SIG_FILE")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          python3 -c "
import json, sys
sig = open(sys.argv[1]).read().strip()
data = {
  'version': sys.argv[2],
  'pub_date': sys.argv[3],
  'notes': '',
  'platforms': {
    'darwin-aarch64': {
      'signature': sig,
      'url': 'https://github.com/mehmetakarim/Arduino-Typing-Tutor/releases/download/' + sys.argv[4] + '/Arduino.Typing.Tutor_aarch64.app.tar.gz'
    }
  }
}
with open('latest-darwin-aarch64.json', 'w') as f:
  json.dump(data, f, indent=2)
print('macOS JSON oluşturuldu')
" "$SIG_FILE" "$VERSION" "$PUB_DATE" "$TAG"
          gh release upload "$TAG" latest-darwin-aarch64.json --clobber

      # ── Windows güncelleme manifesti ────────────────────────────────────────
      - name: Windows güncelleme manifesti oluştur
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = node -p "require('./package.json').version"
          $TAG = "v$VERSION"
          $PUB_DATE = (Get-Date -AsUTC).ToString("yyyy-MM-ddTHH:mm:ssZ")

          # NSIS zip ve sig dosyalarını bul
          $NSIS_ZIP = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $NSIS_ZIP) {
            Write-Host "NSIS zip bulunamadı, mevcut dosyalar:"
            Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse | Select-Object FullName
            exit 0
          }

          $SIG_PATH = "$($NSIS_ZIP.FullName).sig"
          $SIG = (Get-Content $SIG_PATH -Raw).Trim()
          $NSIS_NAME = $NSIS_ZIP.Name

          # NSIS zip'i release'e yükle
          gh release upload $TAG $NSIS_ZIP.FullName --clobber

          # Manifest JSON oluştur
          $JSON = [ordered]@{
            version  = $VERSION
            pub_date = $PUB_DATE
            notes    = ""
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $SIG
                url = "https://github.com/mehmetakarim/Arduino-Typing-Tutor/releases/download/$TAG/$NSIS_NAME"
              }
            }
          }
          $JSON | ConvertTo-Json -Depth 5 | Out-File -FilePath "latest-windows-x86_64.json" -Encoding UTF8NoBOM
          gh release upload $TAG "latest-windows-x86_64.json" --clobber
          Write-Host "Windows manifesti yüklendi."
