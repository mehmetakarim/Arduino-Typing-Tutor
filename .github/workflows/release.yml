name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Rust kur
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust önbelleği
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: npm bağımlılıkları yükle
        run: npm install

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Arduino Typing Tutor ${{ github.ref_name }}'
          releaseBody: |
            ## Kurulum

            **macOS:** `.dmg` dosyasını indirin, uygulamayı Applications klasörüne sürükleyin.
            İlk açılışta: Sağ tık → Aç (imzasız uygulama uyarısını geçmek için)

            **Windows:** `.msi` dosyasını indirip çalıştırın.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # ── macOS: güncelleme manifesti ─────────────────────────────────────────
      - name: macOS güncelleme manifesti oluştur
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SIG=$(cat "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Arduino Typing Tutor.app.tar.gz.sig")
          URL="https://github.com/mehmetakarim/Arduino-Typing-Tutor/releases/download/${TAG}/Arduino.Typing.Tutor_aarch64.app.tar.gz"
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg sig "$SIG" \
            --arg url "$URL" \
            '{"version":$version,"pub_date":$pub_date,"notes":"","platforms":{"darwin-aarch64":{"signature":$sig,"url":$url}}}' \
            > latest-darwin-aarch64.json
          gh release upload "$TAG" latest-darwin-aarch64.json --clobber
          echo "macOS manifesti yüklendi: latest-darwin-aarch64.json"

      # ── Windows: güncelleme manifesti ───────────────────────────────────────
      - name: Windows güncelleme manifesti oluştur
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = node -p "require('./package.json').version"
          $TAG = "v$VERSION"
          $PUB_DATE = (Get-Date -AsUTC).ToString("yyyy-MM-ddTHH:mm:ssZ")
          $NSIS_ZIP = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $NSIS_ZIP) {
            Write-Host "NSIS zip bulunamadi, bundle dizini:"
            Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse | Select-Object FullName
            exit 0
          }
          $SIG = (Get-Content "$($NSIS_ZIP.FullName).sig" -Raw).Trim()
          $URL = "https://github.com/mehmetakarim/Arduino-Typing-Tutor/releases/download/$TAG/$($NSIS_ZIP.Name)"
          gh release upload $TAG $NSIS_ZIP.FullName --clobber
          $json = [ordered]@{
            version  = $VERSION
            pub_date = $PUB_DATE
            notes    = ""
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $SIG
                url       = $URL
              }
            }
          } | ConvertTo-Json -Depth 5
          [System.IO.File]::WriteAllText("latest-windows-x86_64.json", $json, [System.Text.UTF8Encoding]::new($false))
          gh release upload $TAG "latest-windows-x86_64.json" --clobber
          Write-Host "Windows manifesti yuklendi: latest-windows-x86_64.json"
